name: release

# Triggered by tags matching v* — builds all 6 binaries, attaches them
# to a GitHub Release, then packages and publishes the VS Code
# extension to the Marketplace. The .vsix embeds all binaries.
#
# Secrets required:
#   VSCE_PAT  — Azure DevOps PAT with Marketplace -> Manage scope.
#               Create at https://dev.azure.com with the publisher account.
#               Used by `vsce publish` in the publish job.
#
# If VSCE_PAT is missing, the publish job is skipped but the .vsix is
# still attached to the release for manual installation.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to publish (must already exist)'
        required: true

permissions:
  contents: write  # required to create the GitHub Release

jobs:
  build-binaries:
    name: Build binary (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, runner: ubuntu-latest }
          - { goos: linux,   goarch: arm64, runner: ubuntu-latest }
          - { goos: darwin,  goarch: amd64, runner: macos-13 }
          - { goos: darwin,  goarch: arm64, runner: macos-14 }
          - { goos: windows, goarch: amd64, runner: windows-latest }
          - { goos: windows, goarch: arm64, runner: windows-latest }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        shell: bash
        run: |
          exe=""
          if [ "$GOOS" = "windows" ]; then exe=".exe"; fi
          go build -trimpath -ldflags "-s -w" -o "ctx-${GOOS}-${GOARCH}${exe}" ./cmd/ctx
          # Make executable on POSIX so the extension doesn't have to.
          if [ "$GOOS" != "windows" ]; then chmod 0755 "ctx-${GOOS}-${GOARCH}"; fi
          ls -lh "ctx-${GOOS}-${GOARCH}${exe}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ctx-${{ matrix.goos }}-${{ matrix.goarch }}*
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: GitHub Release + .vsix
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: binary-*
          merge-multiple: true
      - name: Display binary structure
        run: ls -lh binaries
      - name: Stage binaries into vscode/bin/
        run: |
          mkdir -p vscode/bin
          cp binaries/* vscode/bin/
          # Ensure POSIX binaries are executable (windows .exe files
          # are left as-is).
          chmod 0755 vscode/bin/ctx-linux-* vscode/bin/ctx-darwin-* 2>/dev/null || true
          ls -lh vscode/bin/
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode/package-lock.json
      - name: Install extension dependencies
        run: npm ci
        working-directory: vscode
      - name: Build extension bundle
        run: npm run package
        working-directory: vscode
      - name: Package .vsix
        run: npx vsce package --no-yarn --out ctx-${{ github.ref_name }}.vsix
        working-directory: vscode
      - name: Attach .vsix to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            binaries/*
            vscode/ctx-*.vsix

  publish-marketplace:
    name: VS Code Marketplace
    needs: [publish-release, check-pat]
    runs-on: ubuntu-latest
    # Only publish when VSCE_PAT is configured. Without it, the .vsix
    # is still downloadable from the GitHub Release for manual install.
    if: ${{ needs.check-pat.outputs.has_pat == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: binary-*
          merge-multiple: true
      - name: Stage binaries
        run: |
          mkdir -p vscode/bin
          cp binaries/* vscode/bin/
          chmod 0755 vscode/bin/ctx-linux-* vscode/bin/ctx-darwin-* 2>/dev/null || true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode/package-lock.json
      - name: Install extension dependencies
        run: npm ci
        working-directory: vscode
      - name: Build extension bundle
        run: npm run package
        working-directory: vscode
      - name: Publish to Marketplace
        run: npx vsce publish --no-yarn --pat "${{ secrets.VSCE_PAT }}"
        working-directory: vscode

  # Guard job — exposes whether VSCE_PAT is configured. Required because
  # the secrets context cannot be referenced directly in job-level `if:`.
  check-pat:
    name: Check VSCE_PAT
    runs-on: ubuntu-latest
    outputs:
      has_pat: ${{ steps.check.outputs.has_pat }}
    steps:
      - id: check
        env:
          PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -n "$PAT" ]; then
            echo "has_pat=true" >> "$GITHUB_OUTPUT"
            echo "VSCE_PAT is configured"
          else
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
            echo "VSCE_PAT is not set; skipping Marketplace publish"
          fi
