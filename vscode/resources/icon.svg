<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background (Marketplace style) -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- Document/bundle shape -->
  <path d="M70 60 Q 70 40 90 40 L 166 40 Q 186 40 186 60 L 186 196 Q 186 216 166 216 L 90 216 Q 70 216 70 196 Z"
        stroke="#e0f2fe" stroke-width="4" fill="none" stroke-linejoin="round"/>
  <!-- Interlocking arrows suggesting context exchange / handoff -->
  <g stroke="url(#arrow)" stroke-width="10" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- Top arrow: left to right -->
    <path d="M95 115 L 161 115"/>
    <path d="M141 95 L 161 115 L 141 135"/>
    <!-- Bottom arrow: right to left -->
    <path d="M161 155 L 95 155"/>
    <path d="M115 135 L 95 155 L 115 175"/>
  </g>
</svg>
